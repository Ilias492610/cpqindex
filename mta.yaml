_schema-version: 3.3.0
ID: cpq-indexation
version: 1.0.0
description: "CPQ Indexation CAP project with preview flow."

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  - name: cpq-indexation-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    properties:
      CPQ_DESTINATION_NAME: CPQ_DEST
      CPQ_INDEXATION_SCRIPT_PATH: /customapi/executescript?scriptname=ApplyIndexationPOC
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: cpq-indexation-postgres
      - name: cpq-indexation-connectivity
      - name: cpq-indexation-destination

  - name: cpq-indexation-postgres-deployer
    type: nodejs
    path: gen/pg
    parameters:
      buildpack: nodejs_buildpack
      no-route: true
      no-start: true
      tasks:
        - name: deploy-to-postgresql
          command: npm start
    requires:
      - name: cpq-indexation-postgres

resources:
  - name: cpq-indexation-postgres
    type: org.cloudfoundry.managed-service
    parameters:
      service: postgresql-db
      service-plan: development

  - name: cpq-indexation-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  - name: cpq-indexation-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite